#
# CodeQL — GitHub Advanced Security'nin Java/Kotlin için statik analizi.
#
# - Push / PR'da hızlı tarama (security-and-quality query suite).
# - Haftalık schedule ile main branch'in baseline'ını koşturur (eklenen yeni
#   bağımlılıkların / Java 8 path'lerinin pratiği yakalanır).
# - JDK 8 ile build edilir (CI / runtime ile birebir).
# - Bulgular GitHub Security tab → Code scanning alerts altında görünür ve
#   PR review pipeline'ına dahil edilir.
#
name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Pazartesi 06:17 UTC — haftalık baseline taraması.
    - cron: '17 6 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Java)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-and-quality default'tan daha kapsamlı (security + maintainability).
          queries: security-and-quality

      - name: Build (Maven, skip tests)
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests package

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
